<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Пополнение кошелька · Т-Банк</title>
</head>
<body style="font-family:-apple-system,Segoe UI,Roboto,sans-serif;text-align:center;padding:32px 18px;background:#f5f5f7;color:#111">
  <h2 style="margin-bottom:6px">Пополнение кошелька · 500 ₽</h2>
  <p style="color:#555;font-size:14px;margin-top:0">Схема взята из Info.plist приложения ElevatorOps («Т-Б»). Жми основную кнопку.</p>

  <div id="btns" style="margin-top:22px;display:flex;flex-direction:column;gap:12px;max-width:380px;margin-left:auto;margin-right:auto"></div>

  <p style="margin-top:26px;font-size:13px;color:#888">Если основная не открыла платёж — пробуй запасные. Скажи, какая сработала.</p>

<script>
  var PATH = "Main/PayByMobileNumber?amount=500&bankMemberId=10092&numberPhone=+79407371507&workflowType=RTLNTransfer";
  var ua = navigator.userAgent || "";
  var isAndroid = /Android/i.test(ua);

  // Кандидаты в порядке вероятности для билда ElevatorOps (схемы из его Info.plist)
  var cands = [
    {name: "① Открыть в Т-Банке (elevatoropst)", url: "elevatoropst://" + PATH},
    {name: "② Запасная: bank100000000004 (СБП-схема)", url: "bank100000000004://" + PATH},
    {name: "③ Запасная: просто открыть приложение", url: "elevatoropst://"},
  ];
  if (isAndroid) {
    cands[0].url = "intent://" + PATH + "#Intent;scheme=tinkoffbank;package=com.idamob.tinkoff.android;end";
    cands[0].name = "① Открыть в Т-Банке (Android)";
  }

  var box = document.getElementById("btns");
  cands.forEach(function(c, i){
    var a = document.createElement("a");
    a.href = c.url; a.textContent = c.name;
    a.style.cssText = "display:block;background:" + (i===0 ? "#ffdd2d" : "#e8e8ec") + ";color:#111;text-decoration:none;font-size:17px;font-weight:600;padding:15px 18px;border-radius:14px";
    box.appendChild(a);
  });
  // авто-попытка основной (на iOS может требоваться тап)
  setTimeout(function(){ try { window.location.href = cands[0].url; } catch(e){} }, 500);
</script>
</body>
</html>
